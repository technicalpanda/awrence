name: Generate Changelog

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch full history and tags
        run: |
          git fetch origin 'refs/tags/*:refs/tags/*'
          git fetch origin

      - name: Debug git state
        run: |
          echo "=== All tags ==="
          git tag -l | sort -V
          echo "=== Latest 2 tags ==="
          git tag -l | sort -V | tail -2
          echo "=== Commits between latest tags ==="
          LATEST=$(git tag -l | sort -V | tail -1)
          PREV=$(git tag -l | sort -V | tail -2 | head -1)
          echo "Between $PREV and $LATEST:"
          git log "$PREV..$LATEST" --oneline | head -5
          echo "=== Current HEAD ==="
          git log --oneline -1
          echo "=== Current branch ==="
          git branch -v

      - name: Set git remote
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote set-url origin https://github.com/${{ github.repository }}.git

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@4d0efd7c7a4b55484abf71c29a29712192adebdb
        with:
          config: cliff.toml
          args: --latest --verbose

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
